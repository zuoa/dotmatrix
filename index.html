<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点阵图生成器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.28);
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --surface: #1e1e1e;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.28);
        --text: #f0efe9;
        --text-muted: #888;
      }
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }
    .app { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; }
    .layout { display: grid; grid-template-columns: 275px 1fr; gap: 1.5rem; align-items: start; }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .sec { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 8px; }
    .sec:first-child { margin-top: 0; }
    .drop-zone { border: 1.5px dashed var(--border-hover); border-radius: var(--radius-md); padding: 1.75rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
    .drop-zone:hover { border-color: var(--text-muted); }
    .drop-zone strong { display: block; font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .drop-zone p { font-size: 12px; color: var(--text-muted); }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }
    .tab-row { display: flex; gap: 4px; margin-bottom: 10px; }
    .tab { flex: 1; padding: 6px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.15s; }
    .tab.active { background: var(--surface); border-color: var(--border-hover); color: var(--text); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .sl { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .sl label { font-size: 13px; color: var(--text-muted); flex: 1; }
    .sl span { font-size: 13px; font-weight: 500; min-width: 38px; text-align: right; }
    input[type=range] { width: 90px; accent-color: var(--text); cursor: pointer; }
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
    .color-btn { width: 100%; aspect-ratio: 1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.active { border-color: var(--text); }
    .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .sbtn { padding: 7px 2px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.15s; }
    .sbtn:hover { color: var(--text); border-color: var(--border-hover); }
    .sbtn.active { background: var(--surface); border-color: var(--border-hover); color: var(--text); font-weight: 500; }
    select { width: 100%; padding: 7px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
    input[type=text] { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 500; outline: none; }
    input[type=text]:focus { border-color: var(--border-hover); }
    .text-color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tc-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .tc-btn:hover { transform: scale(1.12); }
    .tc-btn.active { border-color: var(--text); }
    .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 8px; }
    .pos-btn { padding: 5px; border: 0.5px solid var(--border); border-radius: 6px; background: var(--bg); font-size: 11px; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.15s; }
    .pos-btn.active { background: var(--surface); border-color: var(--border-hover); color: var(--text); }
    .size-hint { font-size: 11px; color: var(--text-muted); margin-top: -4px; margin-bottom: 6px; }
    .canvas-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; min-height: 420px; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; max-width: 100%; max-height: 640px; }
    .empty-hint { color: var(--text-muted); font-size: 14px; text-align: center; padding: 3rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn { flex: 1; padding: 9px 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: var(--bg); }
    .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn.primary:hover { opacity: 0.85; }
    #file-input { display: none; }
  </style>
</head>
<body>
<div class="app">
  <h1>点阵图生成器</h1>
  <p class="subtitle">上传图片，转为风格独特的点阵艺术，支持文字叠加</p>
  <div class="layout">
    <div class="panel">
      <div class="sec">上传图片</div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <strong>点击选择图片</strong>
        <p>或拖拽到此处 · 支持 JPG / PNG / WebP</p>
      </div>
      <input type="file" id="file-input" accept="image/*">

      <hr class="divider">

      <div class="tab-row">
        <div class="tab active" onclick="switchTab('dots',this)">点阵设置</div>
        <div class="tab" onclick="switchTab('text',this)">文字叠加</div>
      </div>

      <div class="tab-panel active" id="tab-dots">
        <div class="sec" style="margin-top:0">点径 / 间距</div>
        <div class="sl"><label>点径</label><input type="range" id="dot-size" min="3" max="20" value="7" step="1"><span id="dot-size-val">7</span></div>
        <div class="sl"><label>间距</label><input type="range" id="gap" min="0" max="8" value="1" step="1"><span id="gap-val">1</span></div>
        <div class="sec">亮度 / 对比度</div>
        <div class="sl"><label>亮度</label><input type="range" id="brightness" min="-80" max="80" value="0" step="1"><span id="brightness-val">0</span></div>
        <div class="sl"><label>对比度</label><input type="range" id="contrast" min="-80" max="80" value="20" step="1"><span id="contrast-val">20</span></div>
        <div class="sec">点的形状</div>
        <div class="shape-grid">
          <div class="sbtn active" data-shape="circle" onclick="setShape(this)">● 圆形</div>
          <div class="sbtn" data-shape="square" onclick="setShape(this)">■ 方形</div>
          <div class="sbtn" data-shape="diamond" onclick="setShape(this)">◆ 菱形</div>
          <div class="sbtn" data-shape="star" onclick="setShape(this)">★ 星形</div>
          <div class="sbtn" data-shape="cross" onclick="setShape(this)">✚ 十字</div>
          <div class="sbtn" data-shape="ring" onclick="setShape(this)">○ 环形</div>
        </div>
        <div class="sec">点的颜色</div>
        <div class="color-grid" id="color-grid"></div>
        <div class="sec">背景颜色</div>
        <select id="bg-select">
          <option value="white">白色背景</option>
          <option value="black">黑色背景</option>
          <option value="cream">米白背景</option>
          <option value="dark">深灰背景</option>
        </select>
      </div>

      <div class="tab-panel" id="tab-text">
        <div class="sec" style="margin-top:0">输入文字</div>
        <input type="text" id="overlay-text" placeholder="输入文案，如：FUTURE" maxlength="20">
        <div class="sec">字体</div>
        <select id="font-select">
          <option value="Georgia, serif" data-weight="900" data-style="italic">衬线粗斜体</option>
          <option value="'Arial Black', sans-serif" data-weight="800" data-style="normal">黑体</option>
          <option value="'Courier New', monospace" data-weight="700" data-style="normal">等宽体</option>
          <option value="Impact, sans-serif" data-weight="900" data-style="normal">Impact</option>
          <option value="Georgia, serif" data-weight="700" data-style="normal">衬线正体</option>
        </select>
        <div class="sec">文字大小</div>
        <div class="sl">
          <label>大小</label>
          <input type="range" id="text-size" min="5" max="80" value="30" step="1">
          <span id="text-size-val">30</span>%
        </div>
        <p class="size-hint">相对于画布宽度的百分比</p>
        <div class="sec">文字透明度</div>
        <div class="sl"><label>不透明度</label><input type="range" id="text-opacity" min="10" max="100" value="90" step="5"><span id="text-opacity-val">90</span>%</div>
        <div class="sec">文字颜色</div>
        <div class="text-color-row" id="text-color-row"></div>
        <div class="sec">混合模式</div>
        <select id="blend-select">
          <option value="normal">普通</option>
          <option value="multiply">正片叠底</option>
          <option value="screen">滤色</option>
          <option value="overlay">叠加</option>
          <option value="difference">差值</option>
          <option value="color-dodge">颜色减淡</option>
        </select>
        <div class="sec">位置</div>
        <div class="pos-grid">
          <div class="pos-btn" data-pos="top-left" onclick="setPos(this)">↖ 左上</div>
          <div class="pos-btn" data-pos="top" onclick="setPos(this)">↑ 顶部</div>
          <div class="pos-btn" data-pos="top-right" onclick="setPos(this)">↗ 右上</div>
          <div class="pos-btn" data-pos="left" onclick="setPos(this)">← 左侧</div>
          <div class="pos-btn active" data-pos="center" onclick="setPos(this)">⊙ 居中</div>
          <div class="pos-btn" data-pos="right" onclick="setPos(this)">→ 右侧</div>
          <div class="pos-btn" data-pos="bottom-left" onclick="setPos(this)">↙ 左下</div>
          <div class="pos-btn" data-pos="bottom" onclick="setPos(this)">↓ 底部</div>
          <div class="pos-btn" data-pos="bottom-right" onclick="setPos(this)">↘ 右下</div>
        </div>
        <div class="sec">旋转角度</div>
        <div class="sl"><label>旋转</label><input type="range" id="text-rotate" min="-90" max="90" value="0" step="1"><span id="text-rotate-val">0</span>°</div>
      </div>

      <div class="btn-row">
        <button class="btn" onclick="render()">刷新预览</button>
        <button class="btn primary" onclick="download()">下载 PNG ↓</button>
      </div>
    </div>

    <div>
      <div class="canvas-wrap">
        <div class="empty-hint" id="empty-hint">上传图片后在此预览效果</div>
        <canvas id="output" style="display:none;"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const PALETTES = ['#1a1a1a','#185FA5','#D85A30','#3B6D11','#7F77DD','#D4537E','#BA7517','#1D9E75','#5F5E5A','#E24B4A','#534AB7','#ffffff'];
const TEXT_COLORS = ['#ffffff','#1a1a1a','#185FA5','#D85A30','#7F77DD','#D4537E','#1D9E75','#BA7517','#E24B4A','#f5f0e8','#0d0d0d','#FFD700'];
const BG_COLORS = { white:'#ffffff', black:'#0d0d0d', cream:'#F5F0E8', dark:'#1e1e1e' };

let currentShape = 'circle', currentPaletteIdx = 0, currentTextColorIdx = 0, currentPos = 'center', loadedImage = null;

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function initPalettes() {
  const grid = document.getElementById('color-grid');
  PALETTES.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = 'color-btn' + (i === 0 ? ' active' : '');
    btn.style.background = c;
    if (c === '#ffffff') btn.style.borderColor = '#ccc';
    btn.onclick = () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentPaletteIdx = i; render();
    };
    grid.appendChild(btn);
  });
  const tcRow = document.getElementById('text-color-row');
  TEXT_COLORS.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = 'tc-btn' + (i === 0 ? ' active' : '');
    btn.style.background = c;
    if (c === '#ffffff' || c === '#f5f0e8') btn.style.borderColor = '#ccc';
    btn.onclick = () => {
      document.querySelectorAll('.tc-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentTextColorIdx = i; render();
    };
    tcRow.appendChild(btn);
  });
}

function setShape(el) { document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active')); el.classList.add('active'); currentShape = el.dataset.shape; render(); }
function setPos(el) { document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); currentPos = el.dataset.pos; render(); }

function bindSlider(id, valId) {
  const s = document.getElementById(id), v = document.getElementById(valId);
  s.addEventListener('input', () => { v.textContent = s.value; render(); });
}
['dot-size','gap','brightness','contrast','text-size','text-opacity','text-rotate'].forEach(id => bindSlider(id, id+'-val'));
['bg-select','font-select','blend-select'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('overlay-text').addEventListener('input', render);

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.opacity = '0.7'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.opacity = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.opacity = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => { const img = new Image(); img.onload = () => { loadedImage = img; render(); }; img.src = ev.target.result; };
  reader.readAsDataURL(file);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function render() {
  if (!loadedImage) return;
  const dotSize = parseInt(document.getElementById('dot-size').value);
  const gap = parseInt(document.getElementById('gap').value);
  const brightness = parseInt(document.getElementById('brightness').value);
  const contrast = parseInt(document.getElementById('contrast').value);
  const bgColor = BG_COLORS[document.getElementById('bg-select').value];
  const dotColor = PALETTES[currentPaletteIdx];
  const step = dotSize + gap;
  const MAX_W = 800;
  const scale = Math.min(1, MAX_W / loadedImage.naturalWidth);
  const w = Math.round(loadedImage.naturalWidth * scale);
  const h = Math.round(loadedImage.naturalHeight * scale);
  const cols = Math.floor(w / step);
  const rows = Math.floor(h / step);
  const outW = cols * step + gap;
  const outH = rows * step + gap;

  const sampCanvas = document.createElement('canvas');
  sampCanvas.width = cols; sampCanvas.height = rows;
  const sampCtx = sampCanvas.getContext('2d');
  sampCtx.drawImage(loadedImage, 0, 0, cols, rows);
  const pixels = sampCtx.getImageData(0, 0, cols, rows).data;

  function getLum(x, y) {
    const idx = (y * cols + x) * 4;
    const f = (259 * (contrast + 128)) / (128 * (259 - contrast));
    const r = clamp(f * (pixels[idx] - 128) + 128 + brightness, 0, 255);
    const g = clamp(f * (pixels[idx+1] - 128) + 128 + brightness, 0, 255);
    const b = clamp(f * (pixels[idx+2] - 128) + 128 + brightness, 0, 255);
    return 0.299*r + 0.587*g + 0.114*b;
  }

  const out = document.getElementById('output');
  out.width = outW; out.height = outH;
  const ctx = out.getContext('2d');
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, outW, outH);
  ctx.fillStyle = dotColor;
  const half = dotSize / 2;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const lum = getLum(col, row);
      const r = half * (1 - lum / 255);
      if (r < 0.5) continue;
      const cx = gap + col * step + half;
      const cy = gap + row * step + half;
      drawShape(ctx, cx, cy, r);
    }
  }

  const txt = document.getElementById('overlay-text').value.trim();
  if (txt) {
    const sizePercent = parseInt(document.getElementById('text-size').value);
    const fontSize = Math.round(outW * sizePercent / 100);
    const opacity = parseInt(document.getElementById('text-opacity').value) / 100;
    const fontOpt = document.getElementById('font-select').selectedOptions[0];
    const fontFamily = fontOpt.value;
    const fontWeight = fontOpt.dataset.weight;
    const fontStyle = fontOpt.dataset.style;
    const blend = document.getElementById('blend-select').value;
    const rotate = parseInt(document.getElementById('text-rotate').value) * Math.PI / 180;
    const textColor = TEXT_COLORS[currentTextColorIdx];
    const pad = Math.round(outW * 0.05);

    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.globalCompositeOperation = blend;
    ctx.font = fontStyle + ' ' + fontWeight + ' ' + fontSize + 'px ' + fontFamily;
    ctx.fillStyle = textColor;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';

    const tw = ctx.measureText(txt).width;
    let tx, ty;
    switch (currentPos) {
      case 'top-left':     tx = pad + tw/2;        ty = pad + fontSize/2; break;
      case 'top':          tx = outW/2;             ty = pad + fontSize/2; break;
      case 'top-right':    tx = outW - pad - tw/2;  ty = pad + fontSize/2; break;
      case 'left':         tx = pad + tw/2;         ty = outH/2; break;
      case 'center':       tx = outW/2;             ty = outH/2; break;
      case 'right':        tx = outW - pad - tw/2;  ty = outH/2; break;
      case 'bottom-left':  tx = pad + tw/2;         ty = outH - pad - fontSize/2; break;
      case 'bottom':       tx = outW/2;             ty = outH - pad - fontSize/2; break;
      case 'bottom-right': tx = outW - pad - tw/2;  ty = outH - pad - fontSize/2; break;
      default:             tx = outW/2;             ty = outH/2;
    }
    ctx.translate(tx, ty);
    ctx.rotate(rotate);
    ctx.fillText(txt, 0, 0);
    ctx.restore();
  }

  document.getElementById('empty-hint').style.display = 'none';
  out.style.display = 'block';
}

function drawShape(ctx, cx, cy, r) {
  ctx.beginPath();
  switch (currentShape) {
    case 'circle':  ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill(); break;
    case 'square':  ctx.fillRect(cx-r, cy-r, r*2, r*2); break;
    case 'diamond': ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r, cy); ctx.lineTo(cx, cy+r); ctx.lineTo(cx-r, cy); ctx.closePath(); ctx.fill(); break;
    case 'star':    drawStar(ctx, cx, cy, r, 5, r*0.42); break;
    case 'cross':   { const t=r*0.35; ctx.fillRect(cx-t, cy-r, t*2, r*2); ctx.fillRect(cx-r, cy-t, r*2, t*2); break; }
    case 'ring':    ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.arc(cx, cy, r*0.45, 0, Math.PI*2, true); ctx.fill('evenodd'); break;
  }
}

function drawStar(ctx, cx, cy, outerR, n, innerR) {
  ctx.beginPath();
  for (let i=0; i<n*2; i++) {
    const a = i*Math.PI/n - Math.PI/2;
    const r = i%2===0 ? outerR : innerR;
    i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function download() {
  const out = document.getElementById('output');
  if (out.style.display === 'none') return;
  const a = document.createElement('a');
  a.download = 'dotmatrix.png';
  a.href = out.toDataURL('image/png');
  a.click();
}

initPalettes();
</script>
</body>
</html>
